name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Vitest 4 requires Node ^20.19 || >=22.12 (via rolldown).
        node-version: ['20.19', '22']

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        # Using `npm install` rather than `npm ci` to tolerate cross-platform
        # optional-dependency resolution for rolldown's native bindings —
        # the lockfile is generated on macOS but CI runs on Linux.
        run: npm install --no-audit --no-fund

      - name: Type-check and build
        run: npm run build

      - name: Run tests
        run: npm test
